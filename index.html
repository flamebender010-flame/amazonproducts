/* ===== ROOT (LIGHT MODE DEFAULT) ===== */
:root{
    --navy:#131921;
    --light-navy:#232f3e;
    --orange:#f3a847;
    --bg:#eaeded;
    --text:#111;
    --card-bg:#ffffff;
    --btn-bg:#ffa41c;
}

/* ===== NIGHT MODE ===== */
body.night{
    --navy:#0b111a;
    --light-navy:#1a2233;
    --orange:#ff9900;
    --bg:#0f1620;
    --text:#eeeeee;
    --card-bg:#1c2433;
    --btn-bg:#ff9900;
}

/* ===== BODY ===== */
body{
    background: var(--bg);
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease;
}

/* ===== HEADER ===== */
header{
    background: var(--navy);
}

/* ===== CARD ===== */
.card{
    background: var(--card-bg);
    transition: 0.3s;
}

/* ===== BUTTON ===== */
.btn{
    background: var(--btn-bg);
    color:#111;
}

body.night .btn{
    color:#111;
}

/* ===== SEARCH ===== */
.search-input{
    background: #fff;
    color: #111;
}

body.night .search-input{
    background: #1c2433;
    color: #fff;
}

/* ===== CATEGORY SIDEBAR ===== */
.category-nav{
    background: var(--light-navy);
}

body.night .category-nav{
    background: #0f1620;
}

/* ===== CATEGORY BUTTON ===== */
.cat-btn{
    color:#fff;
}

body.night .cat-btn{
    color:#ddd;
}

.cat-btn.active{
    background: var(--orange);
    color:#111;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background: var(--orange);
    border-radius:10px;
}

/* ===== SMOOTH TRANSITION ===== */
*{
    transition: background 0.3s ease, color 0.3s ease;
}.search-container{
    position: relative;
    width: 100%;
    max-width: 260px;
}

/* ===== INPUT ===== */
.search-input{
    width: 100%;
    padding: 10px 14px 10px 38px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.08);
    background: #fff;
    color: #111;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.25s ease;
}

/* placeholder */
.search-input::placeholder{
    color: #999;
}

/* ===== ICON ===== */
.search-icon{
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: #888;
    transition: 0.25s;
}

/* ===== HOVER ===== */
.search-input:hover{
    border-color: rgba(0,0,0,0.2);
}

/* ===== FOCUS ===== */
.search-input:focus{
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(243,168,71,0.25);
}

/* icon focus */
.search-container:focus-within .search-icon{
    color: var(--orange);
    transform: translateY(-50%) scale(1.1);
}

/* ===== NIGHT MODE ===== */
body.night .search-input{
    background: #1c2433;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.08);
}

body.night .search-input::placeholder{
    color: #aaa;
}

body.night .search-input:focus{
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(255,153,0,0.25);
}

.category-nav{

body.night .category-nav{

.category-nav.open{

}

.cat-btn:hover{
    background: rgba(255,255,255,0.08);
    transform: translateX(8px);
}

.cat-btn.active{
    background: linear-gradient(135deg, var(--orange), #ff6a00);
    color:#111;
    box-shadow: 0 0 20px rgba(255,165,0,0.5);

.cat-btn:hover i{

body {

                color 0.5s ease;
}

.card {
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    animation: fadeIn 0.6s ease backwards;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 15px 30px rgba(243, 168, 71, 0.3);
    border: 1px solid var(--orange);
}

.btn {
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    z-index: 1;
}

.btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: 0.5s;
    z-index: -1;
}

.btn:hover::before {
    left: 100%;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo span {
    background: linear-gradient(90deg, #ff8c00, #ffee00, #ff8c00);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: logoFlow 3s linear infinite;
}

@keyframes logoFlow {
    from { background-position: 0%; }
    to { background-position: 200%; }
}

::-webkit-scrollbar {
    width: 12px;
    background: var(--navy);
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--orange), #ff4500, var(--orange));

    border-radius: 20px;
    border: 3px solid var(--navy);
    box-shadow: 0 0 10px var(--orange);

}

@keyframes scrollGradient {
    0% { background-position: 0% 0%; }
    50% { background-position: 0% 100%; }
    100% { background-position: 0% 0%; }
}

const list = document.getElementById("list");

function getFavorites() { return JSON.parse(localStorage.getItem("amazon_favorites")) || []; }

function updateFavCount() { document.querySelector(".fav-count").innerText = getFavorites().length; }

function toggleFavorite(icon, name) {
    let favs = getFavorites();
    if(favs.includes(name)) {
        favs = favs.filter(n => n !== name);
        icon.classList.replace("fa-solid", "fa-regular");
        icon.style.color = "#888";
    } else {
        favs.push(name);
        icon.classList.replace("fa-regular", "fa-solid");
        icon.style.color = "#ff4500";
    }
    localStorage.setItem("amazon_favorites", JSON.stringify(favs));
    updateFavCount();
    
    const isActiveFavPage = !document.querySelector(".cat-btn.active");
    if(isActiveFavPage) showFavorites(); 
}

function renderProducts(arr) {

        list.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:50px;">

                          </div>`;
        return;
    }
    const favs = getFavorites();
    arr.forEach(p => {
        const isFav = favs.includes(p.name);
        list.innerHTML += `
            <div class="card">
                <div class="img-box"><img src="${p.img}"></div>
                <i class="${isFav?'fa-solid':'fa-regular'} fa-heart wishlist-icon" 
                   style="color:${isFav?'#ff4500':'#888'}" 
                   onclick="toggleFavorite(this,'${p.name}')"></i>
                <div class="title">${p.name}</div>
                <div class="price">$${p.price}</div>
                <a class="btn" href="${p.link}" target="_blank">BUY ON AMAZON</a>
            </div>`;
    });
}

// DÜZELTME: Arama fonksiyonu iyilestirildi
function searchProducts() {
    const term = document.querySelector(".search-input").value.toLowerCase();
    const filtered = products.filter(p => 
        p.name.toLowerCase().includes(term) || 
        p.cat.toLowerCase().includes(term)
    );
    renderProducts(filtered);
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
}

function showFavorites(event) {
    if(event) event.preventDefault();
    const favsNames = getFavorites();
    const favProducts = products.filter(p => favsNames.includes(p.name));
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    
    if(favProducts.length === 0) {
        list.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:50px;">
                            <h2 style="color:var(--orange)">Henüz favori ürünün yok! ??</h2>
                          </div>`;
    } else {
        renderProducts(favProducts);
    }
}

function toggleMenu() {
    document.querySelector(".category-nav").classList.toggle("open");
    document.querySelector(".menu-toggle").classList.toggle("active");
}

function filterProducts(cat, btn) {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
    renderProducts(filtered);
    
    const nav = document.querySelector(".category-nav");
    const menuBtn = document.querySelector(".menu-toggle");
    if (nav.classList.contains("open")) {
        nav.classList.remove("open");
        menuBtn.classList.remove("active");
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

const themeBtn = document.getElementById("theme-toggle");
themeBtn.onclick = () => {
    document.body.classList.toggle("night");
    const isNight = document.body.classList.contains("night");
    themeBtn.innerText = isNight ? "DAY" : "NIGHT";
    localStorage.setItem("theme", isNight ? "night" : "day");
};

// Baslangiç Ayarlari
if(localStorage.getItem("theme") === "night") {
    document.body.classList.add("night");
    themeBtn.innerText = "DAY";
}
renderProducts(products);
updateFavCount();
</script>
</body>
