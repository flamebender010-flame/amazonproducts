<style>
/* Geзis Yumusatma */
body {
    transition: background-color 0.5s ease, color 0.5s ease;
}

/* Gece/Gьndьz Butonu Цzel Stili */
#theme-toggle {
    position: absolute;
    right: 20px;
    background: var(--orange);
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    color: #111;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
    font-size: 12px;
}

/* Buton Hover ve Aktif Efekti */
#theme-toggle:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px var(--orange);
}

#theme-toggle:active {
    transform: scale(0.95);
}

/* Gece Modunda Butonun Gцrьnьmь */
body.night #theme-toggle {
    background: #5c677d;
    color: #fff;
    box-shadow: 0 4px 15px rgba(255,255,255,0.1);
}

/* Kartlarin yumusak belirmesi iзin */
.card {
    transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.5s ease;
}
.menu-toggle {
    position: absolute;
    left: 20px;
    width: 30px;
    height: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 1001; /* Her zaman ьstte kalsin */
}

.menu-toggle span {
    display: block;
    height: 3px;
    width: 100%;
    background: #fff;
    border-radius: 3px;
    transition: all 0.3s ease; /* Animasyon hizi */
}

/* --- ANIMASYON BASLANGICI --- */

/* Ьst зizgi: 45 derece asagi dцner ve X'in bir kolu olur */
.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(6px, 7px);
}

/* Orta зizgi: Gцrьnmez olur */
.menu-toggle.active span:nth-child(2) {
    opacity: 0;
    transform: translateX(-10px);
}

/* Alt зizgi: -45 derece yukari dцner ve X'in diger kolu olur */
.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(6px, -8px);
}
:root{
--navy:#131921;
--light-navy:#232f3e;
--orange:#f3a847;
--bg:#eaeded;
--text:#111;
--card-bg:#fff;
--btn-bg:#ffa41c;
}

body.night{
--navy:#0b111a;
--light-navy:#1a2233;
--orange:#ff9900;
--bg:#0f1620;
--text:#eee;
--card-bg:#1c2433;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:var(--bg);color:var(--text);transition:.4s;}

/* HEADER */
header{
background:var(--navy);
padding:14px 0;
position:sticky;
top:0;
z-index:1000;
display:flex;
align-items:center;
justify-content:center;
}

.logo{
font-size:28px;
font-weight:900;
color:#fff;
text-decoration:none;
text-shadow:0 0 15px rgba(255,164,28,.9);
}
.logo span{
background:linear-gradient(90deg,#ff0080,#ff8c00,#ffee00,#00ffea,#6a00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-size:300%;
}

/* CART & SEARCH */
.search-container { position: relative; display: flex; align-items: center; margin: 0 20px; }
.search-input {
    width: 250px; padding: 10px 15px 10px 40px; border: 2px solid transparent;
    border-radius: 25px; background-color: var(--light-navy); color: #fff; outline: none; transition: 0.4s;
}
.search-input:focus { width: 350px; background-color: #fff; color: #111; border-color: var(--orange); }
.search-icon { position: absolute; left: 15px; color: #888; }

.wishlist-icon {
    position: absolute; top: 15px; right: 15px; font-size: 22px;
    color: #888; cursor: pointer; transition: 0.3s; z-index: 10;
}
.wishlist-icon.active { color: var(--orange); transform: scale(1.2); }

/* CATEGORY NAV */
.category-nav{
position:fixed; left:-260px; top:0; width:240px; height:100vh;
background:var(--light-navy); padding:90px 20px; display:flex;
flex-direction:column; gap:14px; transition:.35s; z-index:999;
}
.category-nav.open{left:0}

.menu-toggle{ position:absolute; left:20px; cursor:pointer; display:flex; flex-direction:column; gap:5px; }
.menu-toggle span{ width:30px; height:3px; background:#fff; transition: 0.3s; }

.cat-btn{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:8px; cursor:pointer; color:#fff; transition:.3s; }
.cat-btn i{ color:var(--orange); font-size:18px; }
.cat-btn:hover, .cat-btn.active{ background:#fff; color:#131921; font-weight:700; }

/* GRID & CARD */
.container{max-width:1300px; margin:30px auto; padding:0 20px}
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:25px; }
.card{ background:var(--card-bg); border-radius:12px; padding:20px; display:flex; flex-direction:column; position:relative; transition:.3s; }
.card:hover{ transform:translateY(-6px); box-shadow:0 12px 28px rgba(0,0,0,.18); }
.card.cart-item { border: 2px solid var(--orange); }

.img-box{ height:200px; display:flex; align-items:center; justify-content:center; }
.img-box img{ max-width:100%; max-height:100%; object-fit:contain; }
.title{ color:#007185; margin:12px 0; font-weight:600; font-size: 14px; }
.price{ font-size:22px; font-weight:700; margin-bottom:15px; }
.btn{ margin-top:auto; background:var(--btn-bg); color:#111; padding:12px; border-radius:25px; text-align:center; text-decoration:none; font-weight:700; }

#theme-toggle { position: absolute; right: 20px; background: var(--orange); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

/* Custom Scrollbar */
::-webkit-scrollbar{ width:10px; }
::-webkit-scrollbar-thumb{ background: var(--orange); border-radius: 10px; }
</style>
</head>

const list = document.getElementById("list");
const searchInput = document.querySelector(".search-input");

// SEPETI LOCALSTORAGE'DAN AL
function getCart() {
    return JSON.parse(localStorage.getItem("amazon_cart")) || [];
}

// SEPETE EKLE / CIKAR
function toggleCart(iconElement, productName) {
    iconElement.classList.toggle("active");
    
    let cart = getCart();
    if (iconElement.classList.contains("active")) {
        if (!cart.includes(productName)) cart.push(productName);
        iconElement.className = "fa-solid fa-cart-shopping wishlist-icon active";
    } else {
        cart = cart.filter(name => name !== productName);
        iconElement.className = "fa-solid fa-cart-plus wishlist-icon";
    }
    localStorage.setItem("amazon_cart", JSON.stringify(cart));
}

// YILDIZALARI OLUSTUR
function stars(n = 4) {
    let html = "";
    for(let i = 0; i < 5; i++) html += i < n ? '<i class="fa-solid fa-star" style="color:#f0c14b"></i>' : '<i class="fa-regular fa-star" style="color:#f0c14b"></i>';
    return html;
}

// ANA RENDER FONKSIYONU
function render(filter = "all") {
    list.innerHTML = "";
    const cart = getCart();
    
    products.forEach(p => {
        if (filter === "all" || p.cat === filter) {
            const inCart = cart.includes(p.name);
            const iconClass = inCart ? "fa-cart-shopping active" : "fa-cart-plus";

            list.innerHTML += `
                <div class="card">
                    <div class="img-box"><img src="${p.img}"></div>
                    <i class="fa-solid ${iconClass} wishlist-icon" onclick="toggleCart(this, '${p.name}')"></i>
                    <div class="title">${p.name}</div>
                    <div class="rating">${stars()}</div>
                    <div class="price">$${p.price}</div>
                    <a class="btn" href="${p.link}" target="_blank">BUY ON AMAZON</a>
                </div>
            `;
        }
    });
}

// SEPETI GOSTER
function showCart(btn) {
    document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    
    list.innerHTML = "";
    const cartNames = getCart();
    const cartProducts = products.filter(p => cartNames.includes(p.name));
    
    if(cartProducts.length === 0) {
        list.innerHTML = "<h2 style='text-align:center; width:100%; margin-top:50px;'>Your cart is empty! ??</h2>";
        return;
    }
    
    cartProducts.forEach(p => {
        list.innerHTML += `
            <div class="card cart-item">
                <div class="img-box"><img src="${p.img}"></div>
                <i class="fa-solid fa-cart-shopping wishlist-icon active" onclick="toggleCart(this, '${p.name}')"></i>
                <div class="title">${p.name}</div>
                <div class="price">$${p.price}</div>
                <a class="btn" href="${p.link}" target="_blank">BUY ON AMAZON</a>
            </div>
        `;
    });
}

// ARAMA VE FILTRELEME
searchInput.addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(term));
    list.innerHTML = "";
    const cart = getCart();
    filtered.forEach(p => {
        const inCart = cart.includes(p.name);
        list.innerHTML += `
            <div class="card">
                <div class="img-box"><img src="${p.img}"></div>
                <i class="fa-solid ${inCart ? 'fa-cart-shopping active' : 'fa-cart-plus'} wishlist-icon" onclick="toggleCart(this, '${p.name}')"></i>
                <div class="title">${p.name}</div>
                <div class="price">$${p.price}</div>
                <a class="btn" href="${p.link}" target="_blank">BUY ON AMAZON</a>
            </div>`;
    });
});


function toggleMenu() {
    // 1. Sol taraftaki menь panelini bul ve "open" class'ini aз/kapat
    const nav = document.querySelector(".category-nav");
    nav.classList.toggle("open");

    // 2. Ьз зizgili butonu bul ve "active" class'ini aз/kapat (Animasyon burada tetiklenir)
    const menuBtn = document.querySelector(".menu-toggle");
    menuBtn.classList.toggle("active");
}

function filterProducts(cat, btn) {
    // 1. Aktif buton stilini gьncelle
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    
    // 2. Ьrьnleri filtrele ve gцster
    render(cat);
    
    // 3. Menь aзiksa, seзim yapildiktan sonra otomatik kapat
    const nav = document.querySelector(".category-nav");
    if (nav.classList.contains("open")) {
        toggleMenu(); 
    }
}

const themeBtn = document.getElementById("theme-toggle");

// Sayfa yьklendiginde eski tercihi kontrol et
if (localStorage.getItem("theme") === "night") {
    document.body.classList.add("night");
    themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i> DAY';
} else {
    themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i> NIGHT';
}

themeBtn.onclick = () => {
    document.body.classList.toggle("night");
    const isNight = document.body.classList.contains("night");
    
    // Hem metni hem ikonu degistir
    if (isNight) {
        themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i> DAY';
        localStorage.setItem("theme", "night");
    } else {
        themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i> NIGHT';
        localStorage.setItem("theme", "day");
    }
};
// Baslat
render();
